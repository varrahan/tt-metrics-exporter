name: telemetry-release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --locked
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive reproducible metadata
        id: metadata
        run: |
          mkdir -p dist
          {
            echo "version=${GITHUB_REF_NAME#v}"
            echo "epoch=$(git show -s --format=%ct HEAD)"
            echo "date=$(git show -s --format=%cI HEAD)"
          } >> "${GITHUB_OUTPUT}"
      - name: Build and push immutable image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/tt-metrics-exporter:${{ github.ref_name }}
          build-args: |
            VERSION=${{ steps.metadata.outputs.version }}
            REVISION=${{ github.sha }}
            SOURCE_DATE_EPOCH=${{ steps.metadata.outputs.epoch }}
            BUILD_DATE=${{ steps.metadata.outputs.date }}
          provenance: mode=max
          sbom: true
      - uses: sigstore/cosign-installer@v3.8.1
      - name: Sign image digest keylessly
        env:
          DIGEST: ${{ steps.image.outputs.digest }}
        run: cosign sign --yes "ghcr.io/${GITHUB_REPOSITORY}/tt-metrics-exporter@${DIGEST}"
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}/tt-metrics-exporter
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
      - uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/tt-metrics-exporter@${{ steps.image.outputs.digest }}
          format: spdx-json
          output-file: dist/sbom.spdx.json
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/tt-metrics-exporter@${{ steps.image.outputs.digest }}
          format: sarif
          output: dist/vulnerabilities.sarif
          severity: CRITICAL
          ignore-unfixed: true
          limit-severities-for-sarif: true
          exit-code: "1"
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.34.1
      - name: Build versioned publisher and deployment bundle
        run: |
          test "$(sed -n 's/^version = "\([^"]*\)"/\1/p' integrations/ttnn/pyproject.toml)" = "${{ steps.metadata.outputs.version }}"
          test "$(sed -n 's/^__version__ = "\([^"]*\)"/\1/p' src/tt_metrics_exporter/_version.py)" = "${{ steps.metadata.outputs.version }}"
          docker buildx build --target wheel \
            --build-arg VERSION=${{ steps.metadata.outputs.version }} \
            --build-arg REVISION=${{ github.sha }} \
            --build-arg SOURCE_DATE_EPOCH=${{ steps.metadata.outputs.epoch }} \
            --output type=local,dest=dist .
          uv run python -m build integrations/ttnn --wheel --no-isolation --outdir dist
          sed -i \
            -e "s#newName: .*#newName: ghcr.io/${GITHUB_REPOSITORY}/tt-metrics-exporter#" \
            -e "s#digest: sha256:.*#digest: ${{ steps.image.outputs.digest }}#" \
            deploy/kubernetes/overlays/production/kustomization.yaml
          mkdir -p dist/rendered
          kubectl kustomize deploy/kubernetes/overlays/ttsim > dist/rendered/ttsim.yaml
          kubectl kustomize deploy/kubernetes/overlays/production > dist/rendered/production.yaml
          kubectl kustomize deploy/kubernetes/monitoring > dist/rendered/monitoring.yaml
          tar -czf "dist/tt-telemetry-deploy-${GITHUB_REF_NAME}.tar.gz" LICENSE deploy dist/rendered docs
          printf '%s\n' "revision=${GITHUB_SHA}" \
            "image_digest=${{ steps.image.outputs.digest }}" \
            > dist/RELEASE-METADATA
          find dist -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort -z | xargs -0 sha256sum > dist/SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
