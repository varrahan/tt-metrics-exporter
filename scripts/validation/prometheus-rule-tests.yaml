rule_files:
  - /rules.yaml
evaluation_interval: 1m
tests:
  - name: Core exporter alerts fire and recover
    interval: 1m
    input_series:
      - series: up{service="tt-metrics-exporter",node="node-a"}
        values: 0x5 1x7
      - series: tt_exporter_ready{node="node-a"}
        values: 0x5 1x7
      - series: tt_exporter_source_accessible{source="sysfs_root",node="node-a"}
        values: 0x5 1x7
      - series: tt_devices_discovered{node="node-a"}
        values: 0x10 1x3
      - series: tt_health_reset_required{device="0",node="node-a"}
        values: 1x2 0x10
      - series: tt_janitor_state_info{device="0",node="node-a",state="quarantined"}
        values: 1x2 0x10
      - series: tt_exporter_last_success_timestamp_seconds{node="node-a"}
        values: -1000x5 360 420x6
    alert_rule_test:
      - eval_time: 5m
        alertname: TTExporterTargetAbsent
        exp_alerts:
          - exp_labels: {node: node-a, service: tt-metrics-exporter, severity: critical}
            exp_annotations:
              summary: Tenstorrent exporter target is absent
              description: Prometheus cannot scrape the node-local Tenstorrent exporter.
              runbook_url: https://github.com/varrahan/tt-dra-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#endpoint-semantics
      - eval_time: 7m
        alertname: TTExporterTargetAbsent
        exp_alerts: []
      - eval_time: 5m
        alertname: TTExporterNotReady
        exp_alerts:
          - exp_labels: {node: node-a, severity: warning}
            exp_annotations:
              summary: Tenstorrent exporter is not ready
              description: The exporter has no current complete snapshot or a critical source failed.
              runbook_url: https://github.com/varrahan/tt-dra-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#endpoint-semantics
      - eval_time: 7m
        alertname: TTExporterNotReady
        exp_alerts: []
      - eval_time: 5m
        alertname: TTExporterCriticalSourceFailure
        exp_alerts:
          - exp_labels: {node: node-a, source: sysfs_root, severity: critical}
            exp_annotations:
              summary: Tenstorrent sysfs source is inaccessible
              description: The exporter cannot access its configured critical sysfs root.
              runbook_url: https://github.com/varrahan/tt-dra-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#source-policy
      - eval_time: 7m
        alertname: TTExporterCriticalSourceFailure
        exp_alerts: []
      - eval_time: 10m
        alertname: TTExpectedDeviceMissing
        exp_alerts:
          - exp_labels: {node: node-a, severity: critical}
            exp_annotations:
              summary: Expected Tenstorrent device is missing
              description: No Tenstorrent device is present on a node selected for accelerator service.
              runbook_url: https://github.com/varrahan/tt-dra-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#source-policy
      - eval_time: 12m
        alertname: TTExpectedDeviceMissing
        exp_alerts: []
      - eval_time: 2m
        alertname: TTDeviceResetRequired
        exp_alerts:
          - exp_labels: {device: "0", node: node-a, severity: critical}
            exp_annotations:
              summary: Tenstorrent device requires reset
              description: A safe device source reports that reset is required.
              runbook_url: https://github.com/varrahan/tt-dra-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#source-policy
      - eval_time: 4m
        alertname: TTDeviceResetRequired
        exp_alerts: []
      - eval_time: 2m
        alertname: TTDeviceQuarantined
        exp_alerts:
          - exp_labels: {device: "0", node: node-a, state: quarantined, severity: critical}
            exp_annotations:
              summary: Tenstorrent device is quarantined
              description: The hardware janitor has quarantined a device from workload use.
              runbook_url: https://github.com/varrahan/tt-dra-metrics-exporter/blob/main/docs/info/STATE_INGESTION_SECURITY.md#cleanup-ownership
      - eval_time: 4m
        alertname: TTDeviceQuarantined
        exp_alerts: []
      - eval_time: 5m
        alertname: TTExporterCollectionStale
        exp_alerts:
          - exp_labels: {node: node-a, severity: critical}
            exp_annotations:
              summary: Tenstorrent collection is stale
              description: The last complete node snapshot is more than 60 seconds old.
              runbook_url: https://github.com/varrahan/tt-dra-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#endpoint-semantics
      - eval_time: 7m
        alertname: TTExporterCollectionStale
        exp_alerts: []
