apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: tt-metrics-exporter
  labels:
    app.kubernetes.io/name: tt-metrics-exporter
spec:
  groups:
    - name: tt-exporter-recording
      rules:
        - record: node:tt_exporter_ready:max
          expr: max by (cluster, node) (tt_exporter_ready)
        - record: node:tt_exporter_snapshot_age_seconds:max
          expr: max by (cluster, node) (tt_exporter_snapshot_age_seconds)
        - record: node:tt_devices_discovered:sum
          expr: sum by (cluster, node) (tt_devices_discovered)
        - record: node_device:tt_reset_required:max
          expr: max by (cluster, node, device) (tt_health_reset_required)
    - name: tt-exporter-alerts
      rules:
        - alert: TTExporterTargetAbsent
          expr: up{service="tt-metrics-exporter"} == 0
          for: 5m
          labels: {severity: critical}
          annotations:
            summary: Tenstorrent exporter target is absent
            description: Prometheus cannot scrape the node-local Tenstorrent exporter.
            runbook_url: https://github.com/varrahan/tt-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#endpoint-semantics
        - alert: TTExporterNotReady
          expr: tt_exporter_ready == 0
          for: 5m
          labels: {severity: warning}
          annotations:
            summary: Tenstorrent exporter is not ready
            description: The exporter has no current complete snapshot or a critical source failed.
            runbook_url: https://github.com/varrahan/tt-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#endpoint-semantics
        - alert: TTExporterCollectionStale
          expr: time() - tt_exporter_last_success_timestamp_seconds > 60
          for: 5m
          labels: {severity: critical}
          annotations:
            summary: Tenstorrent collection is stale
            description: The last complete node snapshot is more than 60 seconds old.
            runbook_url: https://github.com/varrahan/tt-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#endpoint-semantics
        - alert: TTExporterCriticalSourceFailure
          expr: tt_exporter_source_accessible{source="sysfs_root"} == 0
          for: 5m
          labels: {severity: critical}
          annotations:
            summary: Tenstorrent sysfs source is inaccessible
            description: The exporter cannot access its configured critical sysfs root.
            runbook_url: https://github.com/varrahan/tt-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#source-policy
        - alert: TTExpectedDeviceMissing
          expr: tt_devices_discovered < 1
          for: 10m
          labels: {severity: critical}
          annotations:
            summary: Expected Tenstorrent device is missing
            description: No Tenstorrent device is present on a node selected for accelerator service.
            runbook_url: https://github.com/varrahan/tt-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#source-policy
        - alert: TTDeviceResetRequired
          expr: tt_health_reset_required == 1
          for: 2m
          labels: {severity: critical}
          annotations:
            summary: Tenstorrent device requires reset
            description: A safe device source reports that reset is required.
            runbook_url: https://github.com/varrahan/tt-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#source-policy
        - alert: TTDeviceQuarantined
          expr: tt_janitor_state_info{state="quarantined"} == 1
          for: 2m
          labels: {severity: critical}
          annotations:
            summary: Tenstorrent device is quarantined
            description: The hardware janitor has quarantined a device from workload use.
            runbook_url: https://github.com/varrahan/tt-metrics-exporter/blob/main/docs/info/STATE_INGESTION_SECURITY.md#cleanup-ownership
        - alert: TTDeviceFaultCounterIncreasing
          expr: increase(tt_health_oom_faults_total[10m]) > 0 or increase(tt_health_hang_faults_total[10m]) > 0
          for: 2m
          labels: {severity: warning}
          annotations:
            summary: Tenstorrent device fault counter increased
            description: A device reported a new out-of-memory or hang event.
            runbook_url: https://github.com/varrahan/tt-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#source-policy
        - alert: TTFirmwareHeartbeatStopped
          expr: changes(tt_firmware_heartbeat_total[5m]) == 0
          for: 5m
          labels: {severity: warning}
          annotations:
            summary: Tenstorrent firmware heartbeat stopped
            description: A supported firmware heartbeat has not advanced for five minutes.
            runbook_url: https://github.com/varrahan/tt-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#source-policy
        - alert: TTProfilerRecordsRejected
          expr: increase(tt_exporter_collection_issues_total{source="metalium_profiler_state",reason!="stale_record"}[10m]) > 5
          for: 5m
          labels: {severity: warning}
          annotations:
            summary: Tenstorrent profiler records are repeatedly rejected
            description: The exporter rejected more than five profiler records in ten minutes.
            runbook_url: https://github.com/varrahan/tt-metrics-exporter/blob/main/docs/info/STATE_INGESTION_SECURITY.md#profiler-layout-and-migration
        - alert: TTProfilerCardinalityHigh
          expr: count by (cluster, node, device) (tt_metalium_workload_active) > 900
          for: 10m
          labels: {severity: warning}
          annotations:
            summary: Tenstorrent profiler cardinality is near its limit
            description: More than 900 workload series are active for one device.
            runbook_url: https://github.com/varrahan/tt-metrics-exporter/blob/main/docs/info/STATE_INGESTION_SECURITY.md#profiler-layout-and-migration
        - alert: TTExporterHTTPRejections
          expr: increase(tt_exporter_http_connections_rejected_total[10m]) > 0
          for: 5m
          labels: {severity: warning}
          annotations:
            summary: Tenstorrent exporter rejected HTTP connections
            description: The bounded HTTP queue rejected one or more connections.
            runbook_url: https://github.com/varrahan/tt-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#endpoint-semantics
        - alert: TTExporterHTTPFailures
          expr: increase(tt_exporter_http_requests_total{code_class="5xx"}[10m]) > 5
          for: 5m
          labels: {severity: warning}
          annotations:
            summary: Tenstorrent exporter is returning HTTP failures
            description: More than five exporter requests returned 5xx in ten minutes.
            runbook_url: https://github.com/varrahan/tt-metrics-exporter/blob/main/docs/info/OPERATIONAL_CONTRACT.md#endpoint-semantics
