apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tt-metrics-exporter
  labels:
    app.kubernetes.io/name: tt-metrics-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tt-metrics-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 5s
      sampleLimit: 20000
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
