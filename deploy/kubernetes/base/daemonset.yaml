apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tt-metrics-exporter
  labels:
    app.kubernetes.io/name: tt-metrics-exporter
spec:
  revisionHistoryLimit: 5
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tt-metrics-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tt-metrics-exporter
        telemetry.tenstorrent.com/implementation: python
    spec:
      serviceAccountName: tt-metrics-exporter
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: tt-metrics-exporter:dev
          imagePullPolicy: IfNotPresent
          args:
            - --sysfs-root
            - /mnt/tt/sysfs/class/tenstorrent
            - --listen-address
            - 0.0.0.0
            - --port
            - "9400"
            - --poll-interval
            - "5"
            - --max-snapshot-age
            - "15"
            - --shutdown-grace-period
            - "10"
            - --http-request-deadline
            - "2"
            - --log-format
            - json
          ports:
            - name: metrics
              containerPort: 9400
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 1
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tenstorrent-class
              mountPath: /mnt/tt/sysfs/class/tenstorrent
              readOnly: true
            - name: sys-devices
              mountPath: /mnt/tt/sysfs/devices
              readOnly: true
      volumes:
        - name: tenstorrent-class
          hostPath:
            path: /sys/class/tenstorrent
            type: Directory
        - name: sys-devices
          hostPath:
            path: /sys/devices
            type: Directory
