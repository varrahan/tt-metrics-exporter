apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tt-metrics-exporter
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tt-metrics-exporter
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9400
